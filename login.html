<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Tasty Bistro</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="site-header">
        <div class="header-content">
            <h1><a href="index.html">🍽️ Tasty Bistro</a></h1>
            <nav>
                <a href="index.html">Home</a>
            </nav>
        </div>
    </header>

    <main class="auth-main">
        <section class="auth-card">
            <h2>Login to Your Account</h2>
            <form id="loginForm">
                <div class="msg" id="loginMsg"></div>
                <input type="email" id="loginEmail" placeholder="Email" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button type="submit" class="auth-btn">Login</button>
            </form>
            <p>No account? <a href="signup.html">Sign Up</a></p>
        </section>
    </main>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const msg = document.getElementById('loginMsg');

            if (!email || !password) {
                msg.textContent = 'Please fill all fields.';
                msg.style.color = '#ff4757';
                return;
            }

            // Simulate login - store in localStorage
            localStorage.setItem('user', JSON.stringify({ email: email, loggedIn: true }));
            msg.textContent = 'Login successful! Redirecting...';
            msg.style.color = '#2ed573';
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        });
    </script>
</body>
</html>
